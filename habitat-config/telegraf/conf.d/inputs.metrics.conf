[[inputs.system]] # https://docs.influxdata.com/telegraf/v1/input-plugins/system/
  [inputs.system.tags]
    __influxdb__database = "metrics"

[[inputs.cpu]] # https://docs.influxdata.com/telegraf/v1/input-plugins/cpu/
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = true
  [inputs.cpu.tags]
    __influxdb__database = "metrics"

[[inputs.mem]] # https://docs.influxdata.com/telegraf/v1/input-plugins/mem/
  [inputs.mem.tags]
    __influxdb__database = "metrics"

[[inputs.disk]] # https://docs.influxdata.com/telegraf/v1/input-plugins/disk/
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
  [inputs.disk.tags]
    __influxdb__database = "metrics"

# DiskIO uses /dev instead of /hostfs/dev: https://github.com/influxdata/telegraf/issues/18671
[[inputs.diskio]] # https://docs.influxdata.com/telegraf/v1/input-plugins/diskio/
  [inputs.diskio.tags]
    __influxdb__database = "metrics"

[[inputs.net]] # https://docs.influxdata.com/telegraf/v1/input-plugins/net/
  interfaces = ["eth*", "enp*", "wlan*", "tailscale*"]
  [inputs.net.tags]
    __influxdb__database = "metrics"

[[inputs.docker]] # https://docs.influxdata.com/telegraf/v1/input-plugins/docker/
  endpoint = "tcp://${APP_NAME_HOST}_socket-proxy:2375"
  container_state_include = ["created", "restarting", "running", "removing", "paused", "exited", "dead"]
  timeout = "10s"
  total_include = ["cpu", "network", "blkio"]
  [inputs.docker.tags]
    __influxdb__database = "metrics"
