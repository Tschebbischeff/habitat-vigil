# Configuration file version
apiVersion: 1

# Mark provisioned data sources for deletion if they are no longer in a provisioning file.
# It takes no effect if data sources are already listed in the deleteDatasources section.
prune: true

# List of data sources to insert/update depending on what's
# available in the database.
datasources:
  # https://grafana.com/docs/grafana/latest/datasources/influxdb/configure/#provision-the-influxdb-data-source
  - name: 'InfluxDB - Metrics'
    uid: 'influxdb_metrics'
    type: influxdb
    version: 2
    editable: false
    access: proxy
    url: http://${APP_NAME_HOST}_influxdb:8181
    isDefault: false
    jsonData:
      version: SQL
      dbName: metrics
      insecureGrpc: true
      httpMode: POST
      maxSeries: 1000
      timeInterval: "10s"
    secureJsonData:
      token: '${GF_PROVISIONING_INFLUXDB_TOKEN}'
